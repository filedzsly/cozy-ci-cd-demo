<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozy CI/CD Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ed;
        --panel: #fffdf8;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #d97706;
        --border: #eadfce;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(217, 119, 6, 0.14), transparent 35%),
          linear-gradient(160deg, var(--bg), #efe7db);
        color: var(--text);
      }

      main {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px 32px;
        box-shadow: 0 18px 50px rgba(77, 52, 24, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 3.6rem);
        line-height: 1;
      }

      p {
        margin: 0 0 16px;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .pill {
        display: inline-block;
        margin-bottom: 18px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(217, 119, 6, 0.12);
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #f4ede1;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="pill">GitHub Pages</span>
      <h1>Cozy CI/CD Demo</h1>
      <p>
        This repository now has a GitHub Actions workflow that deploys this
        static site to GitHub Pages after CI passes on the <code>main</code>
        branch.
      </p>
      <p>
        If you can see this page online, the Pages deployment is working.
      </p>
    </main>
  </body>
 </html>
